<div class="cart-container63">
  <h2>🛒 Giỏ Hàng Của Bạn</h2>

  <div class="alert-success" *ngIf="updateMessage">{{ updateMessage }}</div>

  <div class="empty-cart" *ngIf="cartItems.length === 0">
    <p>Giỏ hàng đang trống.</p>
    <button class="btn-continue" (click)="continueShopping()">← Tiếp Tục Mua Sắm</button>
  </div>

  <ng-container *ngIf="cartItems.length > 0">
    <table class="cart-table">
      <thead>
        <tr>
          <th>Xóa</th>
          <th>Hình</th>
          <th>Sản Phẩm</th>
          <th>Đơn Giá</th>
          <th>Số Lượng</th>
          <th>Thành Tiền</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of cartItems" [class.removed-row]="item._remove">
          <td>
            <input type="checkbox" [(ngModel)]="item._remove" />
          </td>
          <td>
            <img [src]="item.image" [alt]="item.name" class="cart-img" />
          </td>
          <td>{{ item.name }}</td>
          <td>{{ item.price | number : "1.0-0" }} ₫</td>
          <td>
            <input
              type="number"
              [(ngModel)]="item.qty"
              min="1"
              class="qty-input"
              [disabled]="item._remove"
            />
          </td>
          <td>{{ item.price * item.qty | number : "1.0-0" }} ₫</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td colspan="5" class="total-label">Tổng Cộng:</td>
          <td class="total-value">{{ total | number : "1.0-0" }} ₫</td>
        </tr>
      </tfoot>
    </table>

    <div class="cart-actions">
      <button class="btn-continue" (click)="continueShopping()">← Tiếp Tục Mua Sắm</button>
      <div class="right-actions">
        <button class="btn-clear" (click)="clearCart()">Xóa Tất Cả</button>
        <button class="btn-update" (click)="updateCart()">Cập Nhật Giỏ Hàng</button>
      </div>
    </div>
  </ng-container>
</div>
